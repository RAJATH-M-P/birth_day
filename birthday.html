<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        :root {
            --bg-start: #fdf7ff;
            --bg-middle: #d4e8ff;
            --bg-end: #8cb7ff;
            --card: rgba(255, 255, 255, 0.92);
            --text: #2d3a5b;
            --accent: #ff6bd3de;
            --accent-soft: #ff9ca3;
            --shadow: 0 20px 70px rgba(20, 45, 105, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, var(--bg-start), var(--bg-middle) 35%, var(--bg-end) 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text);
        }
        .photo-background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.bg-full{
    position:fixed;
    left:50%;
    top:50%;
    z-index:-3;
    pointer-events:none;
    /* Let the image scale to fit inside the viewport without cropping */
    width:auto;
    height:auto;
    object-fit:contain;
    transform:translate(-50%, -50%);
    /* Keep some horizontal padding so it doesn't touch screen edges */
    max-width:92vw;
    max-height:92vh;
    opacity:0.95;
    filter: blur(0.3px) saturate(1.05);
}

@media (max-width: 420px) {
    .bg-full {
        max-width:96vw;
        max-height:70vh;
    }
}

.bg-photo{
    position:absolute;
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    border:5px solid white;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    opacity:0.45;
}

/* Left Image */
.p1{
    left:3%;
    top:15%;
    animation:move1 12s infinite ease-in-out;
}

/* Right Image */
.p2{
    right:3%;
    top:20%;
    animation:move2 14s infinite ease-in-out;
}

/* Bottom Center Image */
.p3{
    left:40%;
    bottom:5%;
    animation:move3 10s infinite ease-in-out;
}

@keyframes move1{
    0%,100%{
        transform:translateY(0px) rotate(-5deg);
    }
    50%{
        transform:translateY(-40px) rotate(5deg);
    }
}

@keyframes move2{
    0%,100%{
        transform:translateY(0px) rotate(5deg);
    }
    50%{
        transform:translateY(-50px) rotate(-5deg);
    }
}

@keyframes move3{
    0%,100%{
        transform:translateX(0px) scale(1);
    }
    50%{
        transform:translateX(40px) scale(1.1);
    }
}

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.75), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(255,220,200,0.55), transparent 30%);
            pointer-events: none;
        }

        .scene {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
        }

        .card {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            text-align: center;
            overflow: visible;
            backdrop-filter: none;
            pointer-events: auto;
        }

        .card::before {
            display: none;
        }

        .title {
            position: relative;
            font-size: clamp(2.4rem, 5vw, 3.4rem);
            margin: 0 0 12px;
            letter-spacing: 0.08em;
            color: #ff4d6d;
            text-shadow: 0 0 25px rgba(255, 109, 148, 0.25);
            animation: pop 0.8s ease;
        }

        .subtitle {
            margin: 0 auto 26px;
            max-width: 16rem;
            font-size: 1.05rem;
            line-height: 1.75;
            color: #4b5772;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff5a76, #ffa297);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(255, 91, 116, 0.22);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 22px 40px rgba(255, 91, 116, 0.28);
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 55%);
            opacity: 0.5;
            transition: opacity 0.25s ease;
        }


        .btn:hover::after {
            opacity: 0.75;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 0 auto 24px;
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65);
            font-size: 0.95rem;
            color: #4b5772;
            letter-spacing: 0.04em;
        }

        .confetti-piece {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            opacity: 0.95;
            pointer-events: none;
            transform-origin: center;
            animation: fall 3s ease-in forwards;
        }

        .intro-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 43, 117, 0.75);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        .intro-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .intro-emoji {
            font-size: clamp(4rem, 12vw, 7rem);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.8);
            animation: pulse 1.2s ease-in-out;
        }

        .event-message {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .event-message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .star {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff7a8;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.9);
            opacity: 0;
            pointer-events: none;
            animation: sparkle 1.5s ease forwards;
        }

        .cake-panel {
            display: none;
            margin: 0 auto 18px;
            padding: 16px 18px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255,255,255,0.75);
            font-size: 1rem;
            color: #3f4f77;
            letter-spacing: 0.03em;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .cake-panel.visible {
            display: block;
            animation: dropIn 0.45s ease both;
        }

        @keyframes dropIn {
            from { transform: translateY(-12px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes sparkle {
            0% { opacity: 1; transform: translateY(0) scale(0.9); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.6); }
        }

        .balloon {
            position: absolute;
            font-size: 3rem;
            animation: float 4s ease-in-out infinite;
        }

        .balloon:nth-child(1) { top: 16%; left: 10%; animation-delay: 0s; }
        .balloon:nth-child(2) { top: 10%; right: 12%; animation-delay: 0.8s; }
        .balloon:nth-child(3) { bottom: 18%; left: 8%; animation-delay: 1.5s; }
        .balloon:nth-child(4) { bottom: 12%; right: 6%; animation-delay: 1.1s; }

        @keyframes pop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(540deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="introOverlay" class="intro-overlay">
        <span id="introEmoji" class="intro-emoji">✨</span>
    </div>

    <div class="scene">
        <div class="card">
            <button class="btn" onclick="celebrate()">🎉 Celebrate! Yours day</button>
        </div>
    </div>
    <!-- Full-size background: use full-bg.png (already in folder) -->
    <img src="full-bg.png" class="bg-full" alt="full background image">

    <div class="photo-background">
    <img src="photo1.jpeg" class="bg-photo p1">
    <img src="photo2.jpeg" class="bg-photo p2">
    <img src="photo3.jpeg" class="bg-photo p3">
     </div>

    <audio id="birthdayAudio" src="birthday-song.mp3" preload="auto"></audio>

    <script>
        const introOverlay = document.getElementById('introOverlay');
        const introEmoji = document.getElementById('introEmoji');
        const eventMessage = document.getElementById('eventMessage');

        function celebrate() {
            showIntroEmoji();
        }

        function showIntroEmoji() {
            const emojis = ['✨', '🎂', '🎈', '🥳', '🎉'];
            introEmoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            introOverlay.classList.add('visible');
            eventMessage.classList.remove('visible');

            setTimeout(() => {
                introOverlay.classList.remove('visible');
                startBirthdayExperience();
            }, 1200);
        }

        function startBirthdayExperience() {
            document.body.classList.add('party-mode');
            document.querySelectorAll('.balloon').forEach((balloon, index) => {
                balloon.style.animation = `float ${4 + (index * 0.4)}s ease-in-out infinite`;
            });

            eventMessage.textContent = 'Let the party begin!';
            eventMessage.classList.add('visible');
            createStars(14);
            createConfetti(60);
            playCelebrationAudio();

            setTimeout(() => {
                eventMessage.textContent = 'A sweet cake is coming...';
                document.getElementById('cakePanel').classList.add('visible');
            }, 1100);

            setTimeout(() => {
                eventMessage.textContent = 'Time for wishes and music!';
                createStars(18);
                createConfetti(60);
            }, 2200);

            setTimeout(() => {
                eventMessage.textContent = 'Keep celebrating!';
            }, 3400);

            setTimeout(() => {
                alert('🎉 HAPPY BIRTHDAY! 🎉\n\nHave an amazing day! 🥳');
            }, 3800);
        }

        function createConfetti(amount) {
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                const size = 8 + Math.random() * 12;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.left = `${Math.random() * window.innerWidth}px`;
                confetti.style.top = `${-40 - Math.random() * 40}px`;
                confetti.style.backgroundColor = ['#ff6b81', '#ffd166', '#4ea8ff', '#70ffb1', '#8257e5'][Math.floor(Math.random() * 5)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.animationDuration = `${2 + Math.random() * 2}s`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4500);
            }
        }

        function createStars(amount) {
            for (let i = 0; i < amount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = `${Math.random() * window.innerWidth}px`;
                star.style.top = `${Math.random() * window.innerHeight}px`;
                star.style.animationDuration = `${1 + Math.random() * 1}s`;
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 1600);
            }
        }

        function playCelebrationAudio() {
            const audio = document.getElementById('birthdayAudio');
            if (audio && typeof audio.play === 'function') {
                audio.currentTime = 0;
                audio.play().catch(() => playBirthdaySong());
            } else {
                playBirthdaySong();
            }
        }

        function playBirthdaySong() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }

                const notes = [
                    { freq: 262, duration: 0.5 },
                    { freq: 262, duration: 0.5 },
                    { freq: 294, duration: 1 },
                    { freq: 262, duration: 1 },
                    { freq: 330, duration: 1 },
                    { freq: 294, duration: 2 },
                    { freq: 262, duration: 0.5 },
                    { freq: 262, duration: 0.5 },
                    { freq: 294, duration: 1 },
                    { freq: 262, duration: 1 },
                    { freq: 349, duration: 1 },
                    { freq: 330, duration: 2 }
                ];

                let currentTime = audioContext.currentTime;
                notes.forEach(note => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.frequency.value = note.freq;
                    gainNode.gain.setValueAtTime(0.3, currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + note.duration);
                    oscillator.start(currentTime);
                    oscillator.stop(currentTime + note.duration);
                    currentTime += note.duration;
                });
            } catch (error) {
                console.log('Audio not available, but celebration continues!');
            }
        }
    </script>
</body>
</html>
